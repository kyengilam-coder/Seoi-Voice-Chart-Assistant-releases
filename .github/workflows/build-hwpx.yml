name: Build HWPX font-fixed document

on:
  push:
    branches: [main]
    paths:
      - build_hwpx.py
      - content/**
      - .github/workflows/build-hwpx.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build HWPX
        run: |
          if [ ! -f build_hwpx.py ]; then
            echo "Build script not added yet; workflow setup commit only."
            exit 0
          fi
          python3 build_hwpx.py

      - name: Validate output
        if: hashFiles('build_hwpx.py') != ''
        run: |
          test -s generated/kidney_external_therapy_KoPubWorld.hwpx
          python3 - <<'PY'
          import zipfile, xml.etree.ElementTree as ET
          p='generated/kidney_external_therapy_KoPubWorld.hwpx'
          with zipfile.ZipFile(p) as z:
              assert z.testzip() is None
              assert z.namelist()[0] == 'mimetype'
              for n in z.namelist():
                  if n.endswith('.xml'):
                      ET.fromstring(z.read(n))
          print('HWPX validation passed')
          PY

      - name: Commit generated document
        if: hashFiles('build_hwpx.py') != ''
        run: |
          git config user.name "ChatGPT HWPX Builder"
          git config user.email "actions@users.noreply.github.com"
          git add generated/kidney_external_therapy_KoPubWorld.hwpx
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "build: generate KoPubWorld HWPX [skip ci]"
            git push origin main
          fi
